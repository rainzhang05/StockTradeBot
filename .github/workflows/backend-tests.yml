name: Backend Tests

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Pytest
        run: pytest
