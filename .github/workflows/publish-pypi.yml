name: Publish PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-distributions:
    name: Build release distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches project version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Refusing to publish {tag}: expected {expected}.")
          print(f"Publishing {expected}")
          PY

      - name: Install frontend
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Install backend build tooling
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]" build twine

      - name: Build package
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv .package-smoke
          .package-smoke/bin/python -m pip install --upgrade pip
          .package-smoke/bin/python -m pip install dist/*.whl httpx
          APP_HOME="$RUNNER_TEMP/stocktradebot-package-smoke"
          .package-smoke/bin/stocktradebot init --app-home "$APP_HOME"
          .package-smoke/bin/stocktradebot doctor --app-home "$APP_HOME"
          .package-smoke/bin/stocktradebot status --app-home "$APP_HOME" >/dev/null
          .package-smoke/bin/stocktradebot --app-home "$APP_HOME" --check-only --no-browser
          APP_HOME="$APP_HOME" .package-smoke/bin/python - <<'PY'
          import os
          from pathlib import Path

          from fastapi.testclient import TestClient

          from stocktradebot.api import create_app
          from stocktradebot.config import initialize_config

          config = initialize_config(Path(os.environ["APP_HOME"]))
          client = TestClient(create_app(config))
          html = client.get("/").text
          assert "Frontend Build Missing" not in html
          assert 'id="root"' in html
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish release to PyPI
    needs: build-distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/stocktradebot
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
